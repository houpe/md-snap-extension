<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Snap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      padding: 20px;
      text-align: center;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 16px;
    }
    .input-section {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .md-input {
      width: 100%;
      height: 100px;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      outline: none;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: scale(1.02);
    }
    .footer {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📸</div>
    <div class="title">Markdown Snap</div>
    <div class="subtitle">精美 Markdown 预览与导出</div>
    
    <div class="input-section">
      <textarea class="md-input" id="mdInput" placeholder="粘贴或输入 Markdown 内容..."></textarea>
    </div>
    
    <button class="btn" id="previewBtn">预览并导出</button>
    
    <div class="footer">复制 Markdown 内容时自动弹出提示</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
